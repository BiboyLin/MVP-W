name: 构建固件

on:
  push:
    branches: [ master, main ]
    paths:
      - 'firmware/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ master, main ]
    paths:
      - 'firmware/**'

jobs:
  build-s3:
    runs-on: ubuntu-latest
    container: espressif/idf:v5.2.1

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 构建 S3 固件
      run: |
        cd firmware/s3
        idf.py set-target esp32s3
        idf.py build

    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: s3-firmware
        path: |
          firmware/s3/build/*.bin
          firmware/s3/build/bootloader/*.bin
          firmware/s3/build/partition_table/*.bin
        retention-days: 7

  build-mcu:
    runs-on: ubuntu-latest
    container: espressif/idf:v5.2.1

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 构建 MCU 固件
      run: |
        cd firmware/mcu
        idf.py set-target esp32
        idf.py build

    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: mcu-firmware
        path: |
          firmware/mcu/build/*.bin
          firmware/mcu/build/bootloader/*.bin
          firmware/mcu/build/partition_table/*.bin
        retention-days: 7
